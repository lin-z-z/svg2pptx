<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bg_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FCFF"/>
      <stop offset="100%" stop-color="#EDF5FA"/>
    </linearGradient>
    <filter id="card_shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#0E5A8A" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="accent_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0E5A8A"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>
  
  <rect width="1280" height="720" fill="url(#bg_grad)"/>
  
  <!-- Geometric Decorations -->
  <path d="M1100 0 L1280 0 L1280 180 Z" fill="#0E5A8A" fill-opacity="0.03"/>
  <circle cx="1200" cy="650" r="100" stroke="#0E5A8A" stroke-width="1" fill="none" opacity="0.1"/>
  <rect x="56" y="56" width="4" height="40" fill="#0E5A8A"/>

  <!-- Page Header -->
  <text x="80" y="88" font-family="Noto Sans SC, sans-serif" font-size="42" font-weight="bold" fill="#0F172A">商业模式：多维盈利矩阵与财务预期</text>
  <text x="80" y="124" font-family="Noto Sans SC, sans-serif" font-size="18" fill="#64748B">清晰的收入来源与优化的成本结构，确保项目长期可持续盈利</text>

  <!-- Bento Grid Layout -->
  
  <!-- Card 1: Revenue Matrix (Top Left) -->
  <g transform="translate(80, 170)" filter="url(#card_shadow)">
    <rect width="540" height="230" rx="16" fill="#FFFFFF"/>
    <text x="24" y="40" font-family="Noto Sans SC, sans-serif" font-size="24" font-weight="bold" fill="#0E5A8A">核心收入矩阵</text>
    
    <!-- Revenue Items -->
    <g transform="translate(24, 70)">
      <rect width="150" height="120" rx="12" fill="#F1F5F9"/>
      <text x="75" y="50" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="16" fill="#64748B">硬件销售</text>
      <text x="75" y="85" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="24" font-weight="bold" fill="#0F172A">一次性收益</text>
    </g>
    <g transform="translate(194, 70)">
      <rect width="150" height="120" rx="12" fill="#E0F2FE"/>
      <text x="75" y="50" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="16" fill="#0E5A8A">SaaS服务</text>
      <text x="75" y="85" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="24" font-weight="bold" fill="#0F172A">订阅制年费</text>
    </g>
    <g transform="translate(364, 70)">
      <rect width="150" height="120" rx="12" fill="#F1F5F9"/>
      <text x="75" y="50" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="16" fill="#64748B">数据运营</text>
      <text x="75" y="85" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="24" font-weight="bold" fill="#0F172A">增值分成</text>
    </g>
  </g>

  <!-- Card 2: Cost/TCO Analysis (Bottom Left) -->
  <g transform="translate(80, 424)" filter="url(#card_shadow)">
    <rect width="540" height="230" rx="16" fill="#FFFFFF"/>
    <text x="24" y="40" font-family="Noto Sans SC, sans-serif" font-size="24" font-weight="bold" fill="#0E5A8A">成本优化与 TCO 分析</text>
    
    <!-- TCO Chart Visualization -->
    <g transform="translate(40, 80)">
      <text x="0" y="0" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#94A3B8">单机运营成本 (TCO)</text>
      <path d="M0 100 Q120 80, 240 50 T460 20" stroke="#0E5A8A" stroke-width="4" fill="none" stroke-linecap="round"/>
      <circle cx="460" cy="20" r="6" fill="#0E5A8A"/>
      <text x="460" y="0" text-anchor="end" font-family="Noto Sans SC, sans-serif" font-size="12" font-weight="bold" fill="#0E5A8A">逐年下降 15%+</text>
      
      <line x1="0" y1="110" x2="460" y2="110" stroke="#E2E8F0" stroke-width="1"/>
      <text x="0" y="130" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#94A3B8">2024</text>
      <text x="230" y="130" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#94A3B8">2025</text>
      <text x="460" y="130" text-anchor="end" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#94A3B8">2026</text>
    </g>
    <rect x="24" y="190" width="100" height="4" rx="2" fill="#0E5A8A" opacity="0.2"/>
    <text x="135" y="200" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#64748B">通过供应链优化与自动化运维实现规模效应</text>
  </g>

  <!-- Card 3: Financial Outlook (Right - Visual Focus) -->
  <g transform="translate(644, 170)" filter="url(#card_shadow)">
    <rect width="556" height="484" rx="16" fill="url(#accent_grad)"/>
    <text x="40" y="60" font-family="Noto Sans SC, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF">未来三年财务展望</text>
    
    <!-- CAGR Big Number -->
    <g transform="translate(40, 100)">
      <text x="0" y="40" font-family="Noto Sans SC, sans-serif" font-size="18" fill="#FFFFFF" fill-opacity="0.8">预计营收复合增长率 (CAGR)</text>
      <text x="0" y="110" font-family="Noto Sans SC, sans-serif" font-size="84" font-weight="bold" fill="#FFFFFF">85%<tspan font-size="32" font-weight="normal">+</tspan></text>
    </g>
    
    <!-- Bar Chart -->
    <g transform="translate(60, 260)">
      <!-- Grid Lines -->
      <line x1="0" y1="160" x2="430" y2="160" stroke="#FFFFFF" stroke-opacity="0.2"/>
      <line x1="0" y1="80" x2="430" y2="80" stroke="#FFFFFF" stroke-opacity="0.1"/>
      
      <!-- Bars -->
      <rect x="40" y="120" width="60" height="40" rx="4" fill="#FFFFFF" fill-opacity="0.3"/>
      <rect x="180" y="70" width="60" height="90" rx="4" fill="#FFFFFF" fill-opacity="0.6"/>
      <rect x="320" y="20" width="60" height="140" rx="4" fill="#FFFFFF"/>
      
      <!-- Growth Arrow -->
      <path d="M100 110 Q210 60, 320 10" stroke="#38BDF8" stroke-width="3" fill="none" stroke-dasharray="8 4"/>
      <path d="M315 15 L325 5 L325 15 Z" fill="#38BDF8"/>
      
      <!-- Labels -->
      <text x="70" y="190" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="16" fill="#FFFFFF">Year 1</text>
      <text x="210" y="190" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="16" fill="#FFFFFF">Year 2</text>
      <text x="350" y="190" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="16" fill="#FFFFFF">Year 3</text>
    </g>
    
    <!-- Insight Note -->
    <rect x="40" y="420" width="476" height="40" rx="8" fill="#000000" fill-opacity="0.15"/>
    <text x="60" y="445" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#FFFFFF" fill-opacity="0.9">💡 盈亏平衡点预计在第 14-18 个月出现，具备极强的抗风险能力</text>
  </g>

  <!-- Bottom Footer Elements -->
  <line x1="80" y1="680" x2="1200" y2="680" stroke="#0E5A8A" stroke-width="0.5" opacity="0.2"/>
  <text x="80" y="700" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#94A3B8">CONFIDENTIAL | BUSINESS MODEL &amp; FINANCIALS</text>
</svg>