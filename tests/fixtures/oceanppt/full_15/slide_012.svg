<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <!-- Background & Decorative Elements -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FCFF"/>
      <stop offset="100%" stop-color="#EBF5FF"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0E5A8A" flood-opacity="0.08"/>
    </filter>
    <filter id="focusShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#0E5A8A" flood-opacity="0.15"/>
    </filter>
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0E5A8A" stroke-width="0.5" stroke-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGrad)"/>
  <rect width="1280" height="720" fill="url(#gridPattern)"/>

  <!-- Header Section -->
  <text x="60" y="80" font-family="Noto Sans SC, sans-serif" font-weight="900" font-size="42" fill="#0F172A">落地路径：分阶段执行规划与近期里程碑</text>
  <rect x="60" y="105" width="80" height="6" fill="#0E5A8A" rx="3"/>
  <text x="160" y="112" font-family="Noto Sans SC, sans-serif" font-size="18" fill="#64748B">小步快跑，分阶段实现从试点到规模化运营的跨越</text>

  <!-- Background Dynamic Arrow Path -->
  <path d="M 80 550 Q 400 550, 640 400 T 1200 150" fill="none" stroke="#0E5A8A" stroke-width="60" stroke-opacity="0.03" stroke-linecap="round"/>
  <path d="M 1180 130 L 1220 150 L 1180 170" fill="none" stroke="#0E5A8A" stroke-width="4" stroke-opacity="0.2"/>

  <!-- Bento Grid Layout -->
  
  <!-- Phase 1: Pilot -->
  <g transform="translate(60, 180)" filter="url(#cardShadow)">
    <rect width="320" height="420" rx="20" fill="#FFFFFF"/>
    <rect width="320" height="80" rx="20" fill="#F1F5F9"/>
    <text x="24" y="50" font-family="Noto Sans SC, sans-serif" font-weight="700" font-size="24" fill="#0F172A">1-2年：试点突破</text>
    
    <circle cx="34" cy="130" r="4" fill="#0E5A8A"/>
    <text x="50" y="136" font-family="Noto Sans SC, sans-serif" font-weight="700" font-size="20" fill="#0E5A8A">聚焦试点城市</text>
    <text x="50" y="165" font-family="Noto Sans SC, sans-serif" font-size="16" fill="#475569">跑通物流配送与电力巡检</text>
    <text x="50" y="190" font-family="Noto Sans SC, sans-serif" font-size="16" fill="#475569">核心盈利模型验证</text>

    <rect x="24" y="340" width="272" height="56" rx="12" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="40" y="375" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#94A3B8" font-style="italic">达成标准：单点城市盈利</text>
  </g>

  <!-- Phase 2: Scaling (Visual Focus) -->
  <g transform="translate(410, 150)" filter="url(#focusShadow)">
    <rect width="460" height="480" rx="24" fill="#FFFFFF" stroke="#0E5A8A" stroke-width="2"/>
    <rect width="460" height="100" rx="24" fill="#0E5A8A"/>
    <text x="32" y="62" font-family="Noto Sans SC, sans-serif" font-weight="700" font-size="32" fill="#FFFFFF">3-5年：规模化运营</text>
    
    <g transform="translate(32, 140)">
      <text x="0" y="30" font-family="Noto Sans SC, sans-serif" font-weight="900" font-size="56" fill="#0E5A8A">关键转折点</text>
      <text x="0" y="80" font-family="Noto Sans SC, sans-serif" font-weight="700" font-size="22" fill="#0F172A">启动跨城 UAM 客运测试</text>
      <path d="M 0 100 L 400 100" stroke="#E2E8F0" stroke-width="1"/>
      
      <g transform="translate(0, 130)">
        <rect width="396" height="120" rx="16" fill="#F0F9FF"/>
        <text x="20" y="40" font-family="Noto Sans SC, sans-serif" font-weight="700" font-size="18" fill="#0369A1">核心里程碑：</text>
        <text x="20" y="75" font-family="Noto Sans SC, sans-serif" font-size="18" fill="#0F172A">• 实现规模化机队智能调度</text>
        <text x="20" y="100" font-family="Noto Sans SC, sans-serif" font-size="18" fill="#0F172A">• 建立跨区域低空交通管理协议</text>
      </g>
    </g>

    <path d="M 400 400 L 430 370 M 430 400 L 430 370 L 400 370" fill="none" stroke="#0E5A8A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Phase 3: Integration -->
  <g transform="translate(900, 180)" filter="url(#cardShadow)">
    <rect width="320" height="420" rx="20" fill="#FFFFFF" fill-opacity="0.8"/>
    <rect width="320" height="80" rx="20" fill="#F1F5F9" fill-opacity="0.8"/>
    <text x="24" y="50" font-family="Noto Sans SC, sans-serif" font-weight="700" font-size="24" fill="#475569">5年+：生态构建</text>
    
    <g transform="translate(24, 120)">
      <text x="0" y="25" font-family="Noto Sans SC, sans-serif" font-weight="700" font-size="20" fill="#0F172A">“海陆空”一体化</text>
      <text x="0" y="55" font-family="Noto Sans SC, sans-serif" font-size="16" fill="#64748B">智慧交通网络全面闭环</text>
      
      <rect y="100" width="272" height="180" rx="12" fill="#F8FAFC"/>
      <text x="15" y="135" font-family="Noto Sans SC, sans-serif" font-size="15" fill="#475569">未来愿景：</text>
      <text x="15" y="170" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#0F172A">● 城市级低空数字化基座</text>
      <text x="15" y="200" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#0F172A">● 自动驾驶与UAM无缝衔接</text>
      <text x="15" y="230" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#0F172A">● 全场景低空经济生活圈</text>
    </g>
  </g>

  <!-- Footer Info -->
  <rect x="60" y="660" width="1160" height="1" fill="#E2E8F0"/>
  <text x="60" y="690" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#94A3B8">备注：本路线图基于当前政策环境与技术预研制定，旨在降低投资不确定性，确保资源投入精准化。</text>
  <text x="1100" y="690" font-family="Noto Sans SC, sans-serif" font-weight="700" font-size="12" fill="#0E5A8A" text-anchor="end">STRATEGIC ROADMAP 2024-2030</text>
</svg>