<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="8" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.08"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E5A8A"/>
      <stop offset="100%" stop-color="#1A73A8"/>
    </linearGradient>
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0E5A8A" stroke-width="0.5" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#F8FCFF"/>
  <rect width="1280" height="720" fill="url(#gridPattern)"/>
  
  <!-- Decorative Background Elements -->
  <circle cx="1200" cy="100" r="200" fill="#0E5A8A" opacity="0.03"/>
  <path d="M-50 600 Q 200 550 400 650 T 900 600 T 1350 650" fill="none" stroke="#0E5A8A" stroke-width="2" opacity="0.1"/>

  <!-- Header Section -->
  <g transform="translate(64, 56)">
    <rect width="4" height="40" fill="url(#primaryGrad)" rx="2"/>
    <text x="20" y="32" font-family="Noto Sans SC, sans-serif" font-size="42" font-weight="bold" fill="#0F172A">核心竞争力：低空赛道差异化优势</text>
    <text x="20" y="70" font-family="Noto Sans SC, sans-serif" font-size="18" fill="#64748B" letter-spacing="2">核心结论：技术、资源、团队三位一体，构筑不可复制的竞争优势</text>
  </g>

  <!-- Bento Grid Layout -->
  
  <!-- Card 1: Technology (The Primary Focus) -->
  <g transform="translate(64, 160)" filter="url(#cardShadow)">
    <rect width="720" height="320" rx="16" fill="#FFFFFF"/>
    <rect width="720" height="8" rx="4" fill="url(#primaryGrad)"/>
    
    <!-- Icon & Title -->
    <g transform="translate(40, 48)">
      <rect width="56" height="56" rx="12" fill="#0E5A8A" opacity="0.1"/>
      <path d="M28 15 L15 22 V38 L28 45 L41 38 V22 Z" stroke="#0E5A8A" stroke-width="2.5" fill="none"/>
      <path d="M28 22 V38 M20 25 L36 35" stroke="#0E5A8A" stroke-width="2" stroke-linecap="round"/>
      
      <text x="76" y="28" font-family="Noto Sans SC, sans-serif" font-size="28" font-weight="bold" fill="#0F172A">技术护城河</text>
      <text x="76" y="52" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#0E5A8A" font-weight="bold" opacity="0.8">HARD TECHNOLOGY MOAT</text>
    </g>

    <!-- Main Content -->
    <text x="40" y="160" font-family="Noto Sans SC, sans-serif" font-size="54" font-weight="bold" fill="#0E5A8A">自研飞控算法</text>
    <text x="40" y="210" font-family="Noto Sans SC, sans-serif" font-size="20" fill="#475569">故障率低于民航级标准，实现全环境感知避障</text>
    
    <!-- Tags -->
    <g transform="translate(40, 250)">
      <rect width="140" height="32" rx="16" fill="#F1F5F9"/>
      <text x="70" y="21" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#475569" text-anchor="middle">多传感器融合</text>
      
      <rect x="155" width="140" height="32" rx="16" fill="#F1F5F9"/>
      <text x="225" y="21" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#475569" text-anchor="middle">毫秒级响应</text>
    </g>
  </g>

  <!-- Card 2: Resources -->
  <g transform="translate(808, 160)" filter="url(#cardShadow)">
    <rect width="408" height="230" rx="16" fill="#FFFFFF"/>
    <g transform="translate(32, 40)">
      <circle cx="24" cy="24" r="24" fill="#0E5A8A" opacity="0.1"/>
      <path d="M24 12 L15 32 L24 28 L33 32 Z" fill="#0E5A8A"/>
      <text x="64" y="22" font-family="Noto Sans SC, sans-serif" font-size="24" font-weight="bold" fill="#0F172A">资源壁垒</text>
      <text x="64" y="44" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#64748B">Resource Barrier</text>
      
      <text x="0" y="100" font-family="Noto Sans SC, sans-serif" font-size="32" font-weight="bold" fill="#0E5A8A">首批运营权</text>
      <text x="0" y="140" font-family="Noto Sans SC, sans-serif" font-size="17" fill="#475569" line-height="1.5">
        <tspan x="0" dy="0">深度参与多地空域改革试点</tspan>
        <tspan x="0" dy="26">抢占核心枢纽起降场资源</tspan>
      </text>
    </g>
  </g>

  <!-- Card 3: Team -->
  <g transform="translate(808, 414)" filter="url(#cardShadow)">
    <rect width="408" height="250" rx="16" fill="#0E5A8A"/>
    <g transform="translate(32, 40)">
      <text x="0" y="22" font-family="Noto Sans SC, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">精英团队</text>
      <text x="0" y="44" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.6">Expert Team</text>
      
      <text x="0" y="100" font-family="Noto Sans SC, sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF">跨界合力</text>
      
      <g transform="translate(0, 130)">
        <rect width="344" height="1" fill="#FFFFFF" opacity="0.2"/>
        <text x="0" y="30" font-family="Noto Sans SC, sans-serif" font-size="18" fill="#FFFFFF" opacity="0.9">航空航天专家 + 互联网大咖</text>
        <text x="0" y="60" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.7">来自中航工业、大疆、阿里、美团等头部企业</text>
      </g>
    </g>
  </g>

  <!-- Card 4: Endorsement (Bottom Wide) -->
  <g transform="translate(64, 504)" filter="url(#cardShadow)">
    <rect width="720" height="160" rx="16" fill="#FFFFFF" stroke="#0E5A8A" stroke-width="1" stroke-dasharray="8 4" opacity="0.8"/>
    <g transform="translate(32, 32)">
      <text x="0" y="20" font-family="Noto Sans SC, sans-serif" font-size="18" font-weight="bold" fill="#64748B">硬实力背书 / EVIDENCE</text>
      
      <g transform="translate(0, 50)">
        <g>
          <text x="0" y="20" font-family="Noto Sans SC, sans-serif" font-size="36" font-weight="bold" fill="#0F172A">40+</text>
          <text x="0" y="48" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#64748B">核心技术专利</text>
        </g>
        <rect x="140" y="0" width="1" height="60" fill="#E2E8F0"/>
        <g transform="translate(180, 0)">
          <text x="0" y="20" font-family="Noto Sans SC, sans-serif" font-size="36" font-weight="bold" fill="#0F172A">12家</text>
          <text x="0" y="48" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#64748B">战略合作伙伴</text>
        </g>
        <rect x="320" y="0" width="1" height="60" fill="#E2E8F0"/>
        <g transform="translate(360, 0)">
          <text x="0" y="20" font-family="Noto Sans SC, sans-serif" font-size="16" font-weight="bold" fill="#0F172A">合作伙伴 LOGO 墙</text>
          <g transform="translate(0, 35)">
            <rect width="60" height="24" rx="4" fill="#F1F5F9"/>
            <rect x="70" width="60" height="24" rx="4" fill="#F1F5F9"/>
            <rect x="140" width="60" height="24" rx="4" fill="#F1F5F9"/>
            <rect x="210" width="60" height="24" rx="4" fill="#F1F5F9"/>
          </g>
        </g>
      </g>
    </g>
  </g>

  <!-- Corner Accent -->
  <path d="M1280 620 L1280 720 L1180 720 Z" fill="#0E5A8A" opacity="0.1"/>
</svg>