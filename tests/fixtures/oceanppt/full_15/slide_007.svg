<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1280" height="720" fill="#F8FCFF" />
  
  <!-- Decorative Background Elements -->
  <circle cx="1200" cy="80" r="150" fill="#0E5A8A" fill-opacity="0.03" />
  <path d="M-50 600 L200 750 L-50 750 Z" fill="#0E5A8A" fill-opacity="0.05" />
  <g opacity="0.1">
    <line x1="80" y1="120" x2="1200" y2="120" stroke="#0E5A8A" stroke-width="1" stroke-dasharray="4 4" />
  </g>

  <!-- Header Section -->
  <text x="80" y="85" font-family="Noto Sans SC, sans-serif" font-size="42" font-weight="bold" fill="#0F172A">
    场景应用一：物流配送开启<tspan fill="#0E5A8A">“分钟级”</tspan>交付时代
  </text>
  <rect x="80" y="105" width="60" height="6" rx="3" fill="#0E5A8A" />

  <!-- Bento Grid Layout -->
  
  <!-- Main Hero Card: Comparison (Left) -->
  <g transform="translate(80, 160)">
    <rect width="740" height="480" rx="16" fill="#FFFFFF" filter="drop-shadow(0 4px 20px rgba(14, 90, 138, 0.08))" />
    <rect width="740" height="480" rx="16" stroke="#0E5A8A" stroke-width="1" stroke-opacity="0.1" fill="none" />
    
    <text x="40" y="50" font-family="Noto Sans SC" font-size="28" font-weight="bold" fill="#0F172A">效率与成本的“代际跨越”</text>
    <text x="40" y="85" font-family="Noto Sans SC" font-size="16" fill="#64748B">传统模式与无人机物流实测对比</text>

    <!-- Efficiency Chart -->
    <g transform="translate(40, 140)">
      <text x="0" y="0" font-family="Noto Sans SC" font-size="20" font-weight="bold" fill="#0F172A">配送时效 (分钟)</text>
      <!-- Traditional Bar -->
      <rect x="0" y="35" width="450" height="40" rx="8" fill="#E2E8F0" />
      <text x="465" y="62" font-family="Noto Sans SC" font-size="16" fill="#64748B">传统配送: 45-60 min</text>
      <!-- Drone Bar -->
      <rect x="0" y="90" width="120" height="40" rx="8" fill="#0E5A8A" />
      <text x="135" y="117" font-family="Noto Sans SC" font-size="20" font-weight="bold" fill="#0E5A8A">无人机: 8-12 min</text>
      
      <!-- Highlight Label -->
      <path d="M500 130 Q550 130 550 80" stroke="#0E5A8A" stroke-width="2" fill="none" stroke-dasharray="4 2" />
      <rect x="530" y="30" width="140" height="40" rx="20" fill="#0E5A8A" />
      <text x="600" y="56" font-family="Noto Sans SC" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">提升 200%+</text>
    </g>

    <!-- Cost Chart -->
    <g transform="translate(40, 320)">
      <text x="0" y="0" font-family="Noto Sans SC" font-size="20" font-weight="bold" fill="#0F172A">单票人力成本</text>
      <!-- Traditional -->
      <rect x="0" y="35" width="400" height="40" rx="8" fill="#E2E8F0" />
      <text x="415" y="62" font-family="Noto Sans SC" font-size="16" fill="#64748B">基准成本 100%</text>
      <!-- Drone -->
      <rect x="0" y="90" width="280" height="40" rx="8" fill="#3B82F6" />
      <text x="295" y="117" font-family="Noto Sans SC" font-size="20" font-weight="bold" fill="#3B82F6">降低 30%</text>
    </g>
  </g>

  <!-- Right Top Card: Scenarios -->
  <g transform="translate(840, 160)">
    <rect width="360" height="230" rx="16" fill="#0E5A8A" />
    <text x="30" y="45" font-family="Noto Sans SC" font-size="24" font-weight="bold" fill="#FFFFFF">商业化闭环场景</text>
    
    <g transform="translate(30, 80)">
      <circle cx="20" cy="20" r="20" fill="#FFFFFF" fill-opacity="0.2" />
      <path d="M12 20 L18 26 L28 16" stroke="#FFFFFF" stroke-width="3" fill="none" />
      <text x="55" y="18" font-family="Noto Sans SC" font-size="18" font-weight="bold" fill="#FFFFFF">末端物流</text>
      <text x="55" y="42" font-family="Noto Sans SC" font-size="14" fill="#FFFFFF" fill-opacity="0.8">山地/海岛/拥堵城区配送</text>
    </g>

    <g transform="translate(30, 150)">
      <circle cx="20" cy="20" r="20" fill="#FFFFFF" fill-opacity="0.2" />
      <path d="M12 20 L18 26 L28 16" stroke="#FFFFFF" stroke-width="3" fill="none" />
      <text x="55" y="18" font-family="Noto Sans SC" font-size="18" font-weight="bold" fill="#FFFFFF">医疗急救</text>
      <text x="55" y="42" font-family="Noto Sans SC" font-size="14" fill="#FFFFFF" fill-opacity="0.8">血液、AED等物资“零等待”</text>
    </g>
  </g>

  <!-- Right Bottom Card: Case/Logo -->
  <g transform="translate(840, 410)">
    <rect width="360" height="230" rx="16" fill="#FFFFFF" stroke="#0E5A8A" stroke-width="1" stroke-opacity="0.1" />
    <text x="30" y="45" font-family="Noto Sans SC" font-size="22" font-weight="bold" fill="#0F172A">典型案例数据</text>
    
    <rect x="30" y="75" width="300" height="120" rx="12" fill="#F1F5F9" />
    <text x="50" y="110" font-family="Noto Sans SC" font-size="16" font-weight="bold" fill="#0E5A8A">某领军物流无人机实测：</text>
    <text x="50" y="145" font-family="Noto Sans SC" font-size="32" font-weight="bold" fill="#0F172A">400,000+</text>
    <text x="210" y="145" font-family="Noto Sans SC" font-size="14" fill="#64748B">累计完成订单</text>
    <text x="50" y="175" font-family="Noto Sans SC" font-size="14" fill="#64748B">已在深、杭、沪等核心城市实现常态化运营</text>
  </g>

  <!-- Footer Tags -->
  <g transform="translate(80, 665)">
    <rect x="0" y="0" width="110" height="28" rx="14" fill="#0E5A8A" fill-opacity="0.1" />
    <text x="55" y="19" font-family="Noto Sans SC" font-size="14" font-weight="bold" fill="#0E5A8A" text-anchor="middle">分钟级交付</text>
    
    <rect x="125" y="0" width="110" height="28" rx="14" fill="#0E5A8A" fill-opacity="0.1" />
    <text x="180" y="19" font-family="Noto Sans SC" font-size="14" font-weight="bold" fill="#0E5A8A" text-anchor="middle">降本增效</text>
    
    <rect x="250" y="0" width="110" height="28" rx="14" fill="#0E5A8A" fill-opacity="0.1" />
    <text x="305" y="19" font-family="Noto Sans SC" font-size="14" font-weight="bold" fill="#0E5A8A" text-anchor="middle">商业闭环</text>
  </g>

  <!-- Decorative Drone Icon (Abstract) -->
  <g transform="translate(1120, 60) scale(0.8)" opacity="0.6">
    <circle cx="40" cy="40" r="35" stroke="#0E5A8A" stroke-width="2" fill="none" />
    <line x1="10" y1="10" x2="70" y2="70" stroke="#0E5A8A" stroke-width="4" />
    <line x1="70" y1="10" x2="10" y2="70" stroke="#0E5A8A" stroke-width="4" />
    <circle cx="40" cy="40" r="8" fill="#0E5A8A" />
  </g>
</svg>