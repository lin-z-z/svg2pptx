<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FCFF" />
      <stop offset="100%" stop-color="#EBF5FF" />
    </linearGradient>
    <linearGradient id="card_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F1F8FF" />
    </linearGradient>
    <linearGradient id="accent_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0E5A8A" />
      <stop offset="100%" stop-color="#1E88E5" />
    </linearGradient>
    <filter id="card_shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="15" flood-color="#0E5A8A" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg_grad)" />
  
  <!-- Decorative Geometric Background -->
  <g opacity="0.4">
    <path d="M 0 500 L 1280 300 M 0 550 L 1280 350 M 0 600 L 1280 400" stroke="#0E5A8A" stroke-width="0.5" fill="none" />
    <circle cx="1100" cy="150" r="100" stroke="#0E5A8A" stroke-width="1" fill="none" opacity="0.3" />
    <circle cx="1100" cy="150" r="150" stroke="#0E5A8A" stroke-width="0.5" fill="none" opacity="0.2" />
  </g>

  <!-- Page Header -->
  <text x="60" y="70" font-family="Noto Sans SC, sans-serif" font-size="20" font-weight="600" fill="#0E5A8A" letter-spacing="2">SCENE APPLICATION 02</text>
  <text x="60" y="110" font-family="Noto Sans SC, sans-serif" font-size="42" font-weight="bold" fill="#0F172A">城市空中交通 (UAM) 重塑出行方式</text>
  <line x1="60" y1="135" x2="160" y2="135" stroke="#0E5A8A" stroke-width="4" />

  <!-- Main Hero Card: 5-10x Efficiency -->
  <g filter="url(#card_shadow)">
    <rect x="60" y="180" width="740" height="480" rx="24" fill="url(#card_grad)" />
    
    <!-- CBD Skyline Silhouette -->
    <path d="M 100 600 L 100 520 L 140 520 L 140 480 L 180 480 L 180 540 L 220 540 L 220 460 L 280 460 L 280 500 L 340 500 L 340 440 L 400 440 L 400 560 L 460 560 L 460 420 L 520 420 L 520 540 L 580 540 L 580 470 L 640 470 L 640 550 L 700 550 L 700 600 Z" fill="#0E5A8A" opacity="0.05" />
    
    <!-- eVTOL Silhouette (Elegant) -->
    <g transform="translate(420, 260) scale(1.2)">
      <path d="M-100,0 Q-50,-20 0,-20 Q50,-20 100,0 Q50,20 0,20 Q-50,20 -100,0" fill="#0E5A8A" opacity="0.1" />
      <path d="M-80,-5 L80,-5 L90,5 L-90,5 Z" fill="#0E5A8A" />
      <circle cx="-60" cy="-15" r="15" stroke="#0E5A8A" stroke-width="2" fill="none" />
      <circle cx="60" cy="-15" r="15" stroke="#0E5A8A" stroke-width="2" fill="none" />
      <rect x="-15" y="-12" width="30" height="15" rx="8" fill="#0E5A8A" />
    </g>

    <text x="100" y="260" font-family="Noto Sans SC, sans-serif" font-size="28" font-weight="bold" fill="#0F172A">三维交通：效率的跨代跃迁</text>
    <text x="100" y="300" font-family="Noto Sans SC, sans-serif" font-size="18" fill="#64748B">核心 CBD 间点对点通勤，彻底摆脱地面拥堵</text>
    
    <text x="100" y="420" font-family="Noto Sans SC, sans-serif" font-size="120" font-weight="bold" fill="#0E5A8A" opacity="0.9">5-10<tspan font-size="48">x</tspan></text>
    <text x="100" y="460" font-family="Noto Sans SC, sans-serif" font-size="24" font-weight="bold" fill="#0E5A8A">通勤效率提升</text>
    
    <rect x="100" y="520" width="180" height="40" rx="20" fill="#0E5A8A" />
    <text x="190" y="546" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">查看渗透率预测</text>
  </g>

  <!-- Side Card 1: Tourism & Lifestyle -->
  <g filter="url(#card_shadow)">
    <rect x="830" y="180" width="390" height="225" rx="24" fill="#FFFFFF" />
    <circle cx="880" cy="230" r="25" fill="#EBF5FF" />
    <path d="M 872 235 L 880 220 L 888 235 Z" stroke="#0E5A8A" stroke-width="2" fill="none" />
    <text x="830" y="230" transform="translate(100, 5)" font-family="Noto Sans SC, sans-serif" font-size="24" font-weight="bold" fill="#0F172A">低空文旅新业态</text>
    <text x="860" y="285" font-family="Noto Sans SC, sans-serif" font-size="16" fill="#64748B" line-height="1.6">
      <tspan x="860" dy="0">· 景区空中观光定制化路径</tspan>
      <tspan x="860" dy="30">· 高端飞行社交与驾驶体验</tspan>
      <tspan x="860" dy="30">· 重新定义城市天际线视野</tspan>
    </text>
  </g>

  <!-- Side Card 2: Future Trend -->
  <g filter="url(#card_shadow)">
    <rect x="830" y="435" width="390" height="225" rx="24" fill="#0F172A" />
    <text x="860" y="485" font-family="Noto Sans SC, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">演进路线图</text>
    
    <!-- Timeline visual -->
    <g transform="translate(860, 530)">
      <rect x="0" y="0" width="330" height="4" rx="2" fill="#334155" />
      <rect x="0" y="0" width="165" height="4" rx="2" fill="#1E88E5" />
      
      <circle cx="0" cy="2" r="6" fill="#1E88E5" />
      <text x="0" y="30" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#94A3B8">固定航线试点</text>
      
      <circle cx="165" cy="2" r="6" fill="#1E88E5" />
      <text x="165" y="30" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">多点组网运行</text>
      
      <circle cx="330" cy="2" r="6" fill="#334155" />
      <text x="330" y="30" text-anchor="end" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#94A3B8">全域自由飞行</text>
    </g>
    
    <text x="860" y="615" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#94A3B8" font-style="italic">“从工具化向生活方式的全面跨越”</text>
  </g>

  <!-- Footer Info -->
  <text x="60" y="695" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#64748B">FUTURE MOBILITY REPORT 2024 | CONFIDENTIAL</text>
  <text x="1220" y="695" text-anchor="end" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#64748B">PAGE 08</text>
</svg>