<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bg_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FCFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:1" />
    </linearGradient>
    <filter id="card_shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0E5A8A" flood-opacity="0.05"/>
    </filter>
    <clipPath id="clip_rounded">
      <rect x="0" y="0" width="100%" height="100%" rx="16" />
    </clipPath>
  </defs>
  
  <rect width="1280" height="720" fill="url(#bg_grad)" />

  <!-- Geometric Decorations -->
  <path d="M1280 0 L1080 0 L1280 200 Z" fill="#0E5A8A" fill-opacity="0.03" />
  <circle cx="1200" cy="650" r="100" fill="#0E5A8A" fill-opacity="0.02" />
  <line x1="80" y1="180" x2="80" y2="640" stroke="#0E5A8A" stroke-width="2" stroke-dasharray="4 4" opacity="0.3" />

  <!-- Page Header -->
  <text x="80" y="80" font-family="Noto Sans SC, sans-serif" font-size="42" font-weight="bold" fill="#0F172A">报告目录：洞察低空经济的投资逻辑</text>
  <rect x="80" y="105" width="60" height="6" fill="#0E5A8A" rx="3" />
  <text x="160" y="112" font-family="Noto Sans SC, sans-serif" font-size="18" fill="#64748B" letter-spacing="1">FROM MACRO STRATEGY TO MICRO EXECUTION</text>

  <!-- Central Logic Path (Vertical Index) -->
  <g transform="translate(80, 180)">
    <!-- Step 1 -->
    <circle cx="0" cy="40" r="12" fill="#0E5A8A" />
    <circle cx="0" cy="40" r="20" fill="none" stroke="#0E5A8A" stroke-width="1" opacity="0.5" />
    
    <!-- Step 2 -->
    <circle cx="0" cy="160" r="12" fill="#0E5A8A" />
    <circle cx="0" cy="160" r="20" fill="none" stroke="#0E5A8A" stroke-width="1" opacity="0.5" />
    
    <!-- Step 3 -->
    <circle cx="0" cy="280" r="12" fill="#0E5A8A" />
    <circle cx="0" cy="280" r="20" fill="none" stroke="#0E5A8A" stroke-width="1" opacity="0.5" />
    
    <!-- Step 4 -->
    <circle cx="0" cy="420" r="16" fill="#0E5A8A" />
    <circle cx="0" cy="420" r="24" fill="none" stroke="#0E5A8A" stroke-width="2" opacity="0.8" />
  </g>

  <!-- Bento Grid Cards -->
  
  <!-- Card 1: Strategy -->
  <g transform="translate(140, 180)" filter="url(#card_shadow)">
    <rect width="1060" height="100" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
    <text x="30" y="45" font-family="Noto Sans SC, sans-serif" font-size="28" font-weight="bold" fill="#0E5A8A">01</text>
    <text x="85" y="45" font-family="Noto Sans SC, sans-serif" font-size="24" font-weight="bold" fill="#0F172A">战略与市场：政策驱动下的万亿蓝海</text>
    <text x="85" y="75" font-family="Noto Sans SC, sans-serif" font-size="16" fill="#64748B">核心定位、万亿级市场规模测算、国家顶层设计解读</text>
    <path d="M1000 40 L1020 50 L1000 60" fill="none" stroke="#0E5A8A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Card 2: Tech -->
  <g transform="translate(140, 300)" filter="url(#card_shadow)">
    <rect width="520" height="100" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
    <text x="30" y="45" font-family="Noto Sans SC, sans-serif" font-size="28" font-weight="bold" fill="#0E5A8A">02</text>
    <text x="85" y="45" font-family="Noto Sans SC, sans-serif" font-size="24" font-weight="bold" fill="#0F172A">技术与基建</text>
    <text x="85" y="75" font-family="Noto Sans SC, sans-serif" font-size="16" fill="#64748B">eVTOL适航、数字空域底座、通航基础设施</text>
  </g>

  <!-- Card 3: Scenarios -->
  <g transform="translate(680, 300)" filter="url(#card_shadow)">
    <rect width="520" height="100" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
    <text x="30" y="45" font-family="Noto Sans SC, sans-serif" font-size="28" font-weight="bold" fill="#0E5A8A">03</text>
    <text x="85" y="45" font-family="Noto Sans SC, sans-serif" font-size="24" font-weight="bold" fill="#0F172A">场景与链条</text>
    <text x="85" y="75" font-family="Noto Sans SC, sans-serif" font-size="16" fill="#64748B">物流/UAM应用、产业链上下游价值分布</text>
  </g>

  <!-- Card 4: Execution (Highlighted) -->
  <g transform="translate(140, 420)" filter="url(#card_shadow)">
    <rect width="1060" height="220" rx="16" fill="#0E5A8A" />
    <!-- Decorative Pattern for Highlight Card -->
    <path d="M800 0 L1060 0 L1060 220 L950 220 Z" fill="#FFFFFF" fill-opacity="0.05" />
    
    <text x="40" y="60" font-family="Noto Sans SC, sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF">04</text>
    <text x="100" y="60" font-family="Noto Sans SC, sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF">核心与执行：本项目竞争优势与落地规划</text>
    
    <line x1="100" y1="90" x2="1000" y2="90" stroke="#FFFFFF" stroke-width="1" opacity="0.3" />
    
    <!-- Sub-points for Card 4 -->
    <g transform="translate(100, 130)">
      <rect width="210" height="60" rx="8" fill="#FFFFFF" fill-opacity="0.1" />
      <text x="15" y="25" font-family="Noto Sans SC, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">独特优势</text>
      <text x="15" y="48" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#DBEAFE">技术壁垒与资源协同</text>
    </g>
    <g transform="translate(330, 130)">
      <rect width="210" height="60" rx="8" fill="#FFFFFF" fill-opacity="0.1" />
      <text x="15" y="25" font-family="Noto Sans SC, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">商业模式</text>
      <text x="15" y="48" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#DBEAFE">盈利闭环与增长引擎</text>
    </g>
    <g transform="translate(560, 130)">
      <rect width="210" height="60" rx="8" fill="#FFFFFF" fill-opacity="0.1" />
      <text x="15" y="25" font-family="Noto Sans SC, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">落地路径</text>
      <text x="15" y="48" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#DBEAFE">三年分阶段执行方案</text>
    </g>
    <g transform="translate(790, 130)">
      <rect width="210" height="60" rx="8" fill="#FFFFFF" fill-opacity="0.1" />
      <text x="15" y="25" font-family="Noto Sans SC, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">风险对冲</text>
      <text x="15" y="48" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#DBEAFE">政策与市场波动预案</text>
    </g>
  </g>

  <!-- Bottom Label -->
  <g transform="translate(140, 670)">
    <text font-family="Noto Sans SC, sans-serif" font-size="14" fill="#94A3B8" font-weight="bold">核心逻辑</text>
    <text x="80" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#64748B">从宏观战略到微观落地，全方位解析低空经济的商业闭环。</text>
    <rect x="0" y="15" width="1060" height="2" fill="#E2E8F0" />
    <rect x="0" y="15" width="200" height="2" fill="#0E5A8A" />
  </g>
  
  <!-- Keywords Accent -->
  <g transform="translate(1050, 60)">
    <rect width="180" height="40" rx="20" fill="#DBEAFE" />
    <text x="90" y="26" font-family="Noto Sans SC, sans-serif" font-size="16" font-weight="bold" fill="#0E5A8A" text-anchor="middle">投资逻辑：商业闭环</text>
  </g>
</svg>